version: 1
services:
  # 🚀 CITYPULSE BACKEND (FastAPI Web Service)
  - type: web
    name: citypulse-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./city_intelligence.db

  # 🌐 CITYPULSE FRONTEND (React Production Web Service)
  - type: web
    name: citypulse-frontend
    env: node
    rootDir: react-ui
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: citypulse-backend
          property: host
