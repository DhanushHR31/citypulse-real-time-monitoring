services:
  # 🚀 CITYPULSE BACKEND (FastAPI)
  - type: web
    name: citypulse-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in Render dashboard
      - key: NEWS_API_KEY
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./city_intelligence.db # Or use a Render Postgres

  # 🌐 CITYPULSE FRONTEND (React/Vite)
  - type: web
    name: citypulse-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    rootDir: react-ui
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: citypulse-backend
          property: host
