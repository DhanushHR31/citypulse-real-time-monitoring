version: 1
services:
  # 🚀 BACKEND (FastAPI - Free Plan)
  - type: web
    name: citypulse-backend
    env: python
    plan: free # Explicitly setting to FREE to avoid card requirement
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false

  # 🌐 FRONTEND (React Static Site - Always Free)
  - type: static
    name: citypulse-frontend
    rootDir: react-ui
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: citypulse-backend
          property: host
